services:
  docs:
    image: wagtail_next_local_docs
    container_name: wagtail_next_local_docs
    build:
      context: .
      dockerfile: ./compose/local/docs/Dockerfile
    env_file:
      - ./.envs/.local/.django
    volumes:
      - ./docs:/docs:z
      - ./config:/app/config:z
      - ./wagtail_next:/app/wagtail_next:z
    ports:
      - '9000:9000'
    command: /start-docs
